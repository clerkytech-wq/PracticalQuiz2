<!DOCTYPE html>
<html>
<head>
   <meta charset="utf-8">
   <title>Dark Brown Elegant Dining Scene</title>
   <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
   <a-scene background="color: #2c2416">
       
       <!-- Lighting -->
       <a-light type="ambient" color="#ffecd1" intensity="0.4"></a-light>
       <a-light type="point" position="0 3.5 0" color="#ffd699" intensity="1.2" cast-shadow="true" shadow-bias="-0.001"></a-light>
       <a-light type="spot" position="-3 4 3" target="#table-center" color="#ffaa55" intensity="0.6" angle="45" penumbra="0.3" cast-shadow="true"></a-light>
       <a-light type="spot" position="3 4 -3" target="#table-center" color="#ffaa55" intensity="0.4" angle="45" penumbra="0.3"></a-light>
       
       <!-- Room Structure -->
       <!-- Floor -->
       <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#3d3226" roughness="0.8" metalness="0.1" shadow="receive: true"></a-plane>
       <!-- Rug -->
       <a-circle position="0 0.02 0" rotation="-90 0 0" radius="3.5" color="#5c4a3d" opacity="0.9" roughness="1"></a-circle>
       <a-circle position="0 0.03 0" rotation="-90 0 0" radius="2.8" color="#6b5344" opacity="0.8"></a-circle>
       
       <!-- Dark Brown Walls -->
       <a-plane position="0 4 -6" width="20" height="8" color="#3e2723" roughness="0.9"></a-plane>
       <a-plane position="-6 4 0" rotation="0 90 0" width="20" height="8" color="#3e2723" roughness="0.9"></a-plane>
       <a-plane position="6 4 0" rotation="0 -90 0" width="20" height="8" color="#3e2723" roughness="0.9"></a-plane>
       
       <!-- Wall Paneling Details -->
       <a-box position="0 4 -5.9" width="16" height="0.1" depth="0.1" color="#2c1e1b"></a-box>
       <a-box position="0 6 -5.9" width="16" height="0.15" depth="0.15" color="#2c1e1b"></a-box>
       <a-box position="0 2 -5.9" width="16" height="0.15" depth="0.15" color="#2c1e1b"></a-box>
       <a-box position="-4 4 -5.9" width="0.15" height="8" depth="0.15" color="#2c1e1b"></a-box>
       <a-box position="0 4 -5.9" width="0.15" height="8" depth="0.15" color="#2c1e1b"></a-box>
       <a-box position="4 4 -5.9" width="0.15" height="8" depth="0.15" color="#2c1e1b"></a-box>
       
       <!-- Luxury Table -->
       <a-entity id="table-center" position="0 0 0">
           <!-- Table Top - Rich dark wood with marble-like center -->
           <a-cylinder position="0 1.4 0" radius="1.6" height="0.12" color="#1a1a1a" roughness="0.2" metalness="0.1" shadow="cast: true; receive: true"></a-cylinder>
           <a-cylinder position="0 1.41 0" radius="1.4" height="0.11" color="#2c2c2c" roughness="0.1" metalness="0.3" shadow="receive: true"></a-cylinder>
           <!-- Gold trim -->
           <a-torus position="0 1.35 0" radius="1.6" radius-tubular="0.03" rotation="90 0 0" color="#d4af37" metalness="0.8" roughness="0.2"></a-torus>
           
           <!-- Table Base - Sculptural pedestal -->
           <a-cylinder position="0 0.7 0" radius="0.3" height="1.4" color="#1a1a1a" roughness="0.3" shadow="cast: true"></a-cylinder>
           <a-cylinder position="0 0.8 0" radius="0.5" height="0.2" color="#2c2c2c" roughness="0.3"></a-cylinder>
           <a-cylinder position="0 0.4 0" radius="0.4" height="0.15" color="#2c2c2c" roughness="0.3"></a-cylinder>
           <!-- Base platform -->
           <a-cylinder position="0 0.15 0" radius="1" height="0.1" color="#1a1a1a" roughness="0.3" shadow="cast: true"></a-cylinder>
           <a-ring position="0 0.21 0" rotation="-90 0 0" radius-inner="0.9" radius-outer="1" color="#d4af37" metalness="0.8" roughness="0.2"></a-ring>
       </a-entity>
       
       <!-- Luxury Chair 1 - Front Left -->
       <a-entity position="0 0 2.3" rotation="0 180 0">
           <!-- Seat - plush velvet -->
           <a-box position="0 0.9 0" width="0.9" height="0.15" depth="0.9" color="#4a3728" roughness="1" shadow="cast: true"></a-box>
           <a-box position="0 0.85 0" width="0.85" height="0.1" depth="0.85" color="#5c4033" roughness="1"></a-box>
           <!-- Cushion -->
           <a-box position="0 0.98 0" width="0.8" height="0.08" depth="0.8" color="#6b4423" roughness="1"></a-box>
           
           <!-- Backrest - tufted style -->
           <a-box position="0 1.6 -0.4" width="0.9" height="1" depth="0.15" color="#4a3728" roughness="1" shadow="cast: true"></a-box>
           <!-- Tufting details -->
           <a-sphere position="-0.25 1.8 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0.25 1.8 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="-0.25 1.4 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0.25 1.4 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0 1.6 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           
           <!-- Armrests -->
           <a-box position="-0.5 1.2 0" width="0.15" height="0.1" depth="0.9" color="#3d2b1f" roughness="1"></a-box>
           <a-box position="0.5 1.2 0" width="0.15" height="0.1" depth="0.9" color="#3d2b1f" roughness="1"></a-box>
           <a-cylinder position="-0.5 1.0 0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="0.5 1.0 0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="-0.5 1.0 -0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="0.5 1.0 -0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           
           <!-- Legs - carved wood -->
           <a-cylinder position="-0.35 0.45 -0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="0.35 0.45 -0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="-0.35 0.45 0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="0.35 0.45 0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <!-- Gold feet -->
           <a-sphere position="-0.35 0.05 -0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="0.35 0.05 -0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="-0.35 0.05 0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="0.35 0.05 0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
       </a-entity>
       
       <!-- Luxury Chair 2 - Front Right -->
       <a-entity position="2.3 0 0" rotation="0 -90 0">

           <a-box position="0 1.6 -0.4" width="0.9" height="1" depth="0.15" color="#4a3728" roughness="1" shadow="cast: true"></a-box>
           <a-sphere position="-0.25 1.8 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0.25 1.8 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="-0.25 1.4 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0.25 1.4 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0 1.6 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           
           <a-box position="-0.5 1.2 0" width="0.15" height="0.1" depth="0.9" color="#3d2b1f" roughness="1"></a-box>
           <a-box position="0.5 1.2 0" width="0.15" height="0.1" depth="0.9" color="#3d2b1f" roughness="1"></a-box>
           <a-cylinder position="-0.5 1.0 0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="0.5 1.0 0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="-0.5 1.0 -0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="0.5 1.0 -0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           
           <a-cylinder position="-0.35 0.45 -0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="0.35 0.45 -0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="-0.35 0.45 0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="0.35 0.45 0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-sphere position="-0.35 0.05 -0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="0.35 0.05 -0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="-0.35 0.05 0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="0.35 0.05 0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
       </a-entity>
       
       <!-- Luxury Chair 3 - Back Left -->

           <a-box position="0 0.85 0" width="0.85" height="0.1" depth="0.85" color="#5c4033" roughness="1"></a-box>
           <a-box position="0 0.98 0" width="0.8" height="0.08" depth="0.8" color="#6b4423" roughness="1"></a-box>
           
           <a-box position="0 1.6 -0.4" width="0.9" height="1" depth="0.15" color="#4a3728" roughness="1" shadow="cast: true"></a-box>
           <a-sphere position="-0.25 1.8 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0.25 1.8 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="-0.25 1.4 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0.25 1.4 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0 1.6 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           
           <a-box position="-0.5 1.2 0" width="0.15" height="0.1" depth="0.9" color="#3d2b1f" roughness="1"></a-box>
           <a-box position="0.5 1.2 0" width="0.15" height="0.1" depth="0.9" color="#3d2b1f" roughness="1"></a-box>
           <a-cylinder position="-0.5 1.0 0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="0.5 1.0 0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="-0.5 1.0 -0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="0.5 1.0 -0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           
           <a-cylinder position="-0.35 0.45 -0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="0.35 0.45 -0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="-0.35 0.45 0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="0.35 0.45 0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-sphere position="-0.35 0.05 -0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="0.35 0.05 -0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="-0.35 0.05 0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="0.35 0.05 0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
       </a-entity>
       
       <!-- Luxury Chair 4 - Back Right -->
       <a-entity position="-2.3 0 0" rotation="0 90 0">
           <a-box position="0 0.9 0" width="0.9" height="0.15" depth="0.9" color="#4a3728" roughness="1" shadow="cast: true"></a-box>
           <a-box position="0 0.85 0" width="0.85" height="0.1" depth="0.85" color="#5c4033" roughness="1"></a-box>
           <a-box position="0 0.98 0" width="0.8" height="0.08" depth="0.8" color="#6b4423" roughness="1"></a-box>
           
           <a-box position="0 1.6 -0.4" width="0.9" height="1" depth="0.15" color="#4a3728" roughness="1" shadow="cast: true"></a-box>
           <a-sphere position="-0.25 1.8 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0.25 1.8 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="-0.25 1.4 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0.25 1.4 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           <a-sphere position="0 1.6 -0.32" radius="0.04" color="#3d2b1f"></a-sphere>
           
           <a-box position="-0.5 1.2 0" width="0.15" height="0.1" depth="0.9" color="#3d2b1f" roughness="1"></a-box>
           <a-box position="0.5 1.2 0" width="0.15" height="0.1" depth="0.9" color="#3d2b1f" roughness="1"></a-box>
           <a-cylinder position="-0.5 1.0 0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="0.5 1.0 0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="-0.5 1.0 -0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           <a-cylinder position="0.5 1.0 -0.4" radius="0.06" height="0.4" color="#3d2b1f"></a-cylinder>
           
           <a-cylinder position="-0.35 0.45 -0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="0.35 0.45 -0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="-0.35 0.45 0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-cylinder position="0.35 0.45 0.35" radius="0.06" height="0.9" color="#2c1810"></a-cylinder>
           <a-sphere position="-0.35 0.05 -0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="0.35 0.05 -0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="-0.35 0.05 0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
           <a-sphere position="0.35 0.05 0.35" radius="0.07" color="#d4af37" metalness="0.8" roughness="0.2"></a-sphere>
       </a-entity>
       
       <!-- MiLo Tin - Premium packaging -->
       <a-entity position="-0.5 1.52 -0.3" rotation="0 15 0">
           <a-cylinder radius="0.14" height="0.3" color="#1b5e20" roughness="0.3" metalness="0.1" shadow="cast: true"></a-cylinder>
           <a-cylinder position="0 0.15 0" radius="0.135" height="0.02" color="#c0c0c0" metalness="0.6" roughness="0.3"></a-cylinder>
           <!-- Label -->
           <a-cylinder position="0 0 0.135" radius="0.1" height="0.25" color="#2e7d32" opacity="0.9"></a-cylinder>
           <a-text value="MILO" position="0 0.05 0.14" align="center" width="1.5" color="#ffd700" font="kelsonsans"></a-text>
           <a-text value="ENERGY" position="0 -0.05 0.14" align="center" width="0.8" color="#ffffff"></a-text>
           <!-- Gold band -->

       </a-entity>
       
       <!-- Cup 1 - Fine china -->
       <a-entity position="-0.3 1.48 0.4">
           <a-cylinder radius="0.09" height="0.18" color="#ffffff" open-ended="true" side="double" roughness="0.1" shadow="cast: true"></a-cylinder>
