<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A-Frame Installation</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
</head>
<body>
  <a-scene shadow="type: pcfsoft">
<!-- PLAYER / CAMERA RIG -->
<a-entity id="player" position="0 1.6 5">

    <a-camera
        wasd-controls="acceleration:30"
        look-controls="pointerLockEnabled: true">

        <!-- Cursor for interaction -->
        <a-cursor
            color="#FFD700"
            fuse="false">
        </a-cursor>

    </a-camera>

</a-entity>
<!--
 CAMERA WITH MOVEMENT CONTROLS 
<a-entity id="rig" position="0 1.6 5">

    <a-camera
        wasd-controls="acceleration: 40"
        look-controls="pointerLockEnabled: true"
    ></a-camera>

</a-entity>
-->

<!-- Lighting -->
<a-light type="ambient" intensity="0.6" color="#c9a57c"></a-light>
<a-light type="point" intensity="1.4" position="0 3 0" color="#d6b98c"></a-light>

<!-- FLOOR -->
<a-plane
rotation="-90 0 0"
width="12"
height="12"
color="#2a1a12">
</a-plane>

<!-- BACK WALL -->
<a-box
position="0 2 -5"
width="10"
height="4"
depth="0.1"
color="#3b2416">
</a-box>

<!-- LEFT WALL -->
<a-box
position="-5 2 0"
width="0.1"
height="4"
depth="10"
color="#3b2416">
</a-box>

<!-- RIGHT WALL -->
<a-box
position="5 2 0"
width="0.1"
height="4"
depth="10"
color="#3b2416">
</a-box>

<!-- WALL FRAME -->
<a-box
position="0 2 -4.9"
width="3"
height="2"
depth="0.05"
color="#8a5c3c">
</a-box>

<!-- ROUND CARPET -->
<a-cylinder
position="0 0.01 0"
radius="2.2"
height="0.02"
color="#4a2e20">
</a-cylinder>

<!-- TABLE TOP -->
<a-cylinder
position="0 0.8 0"
radius="1"
height="0.1"
color="#5c3928">
</a-cylinder>

<!-- TABLE LEG -->
<a-cylinder
position="0 0.4 0"
radius="0.12"
height="0.8"
color="#2b1a12">
</a-cylinder>

<!-- VASE -->
<a-cylinder
position="0 0.95 0"
radius="0.18"
height="0.35"
color="#8a5c3c">
</a-cylinder>

<!-- PLANT -->
<a-cone position="0.15 1.2 0" radius-bottom="0.05" height="0.4" color="#3f6b3a"></a-cone>
<a-cone position="-0.15 1.2 0" radius-bottom="0.05" height="0.4" color="#3f6b3a"></a-cone>
<a-cone position="0 1.25 0.15" radius-bottom="0.05" height="0.4" color="#3f6b3a"></a-cone>

<!-- CHAIRS -->
<a-cylinder position="1.6 0.45 0" radius="0.35" height="0.9" color="#5a3825"></a-cylinder>
<a-cylinder position="-1.6 0.45 0" radius="0.35" height="0.9" color="#5a3825"></a-cylinder>
<a-cylinder position="0 0.45 1.6" radius="0.35" height="0.9" color="#5a3825"></a-cylinder>
<a-cylinder position="0 0.45 -1.6" radius="0.35" height="0.9" color="#5a3825"></a-cylinder>

<!-- CHANDELIER -->
<a-entity position="0 3 0">

<a-sphere radius="0.06" position="0 0 0" color="#d6b98c"></a-sphere>
<a-sphere radius="0.06" position="0.3 0 -0.2" color="#d6b98c"></a-sphere>
<a-sphere radius="0.06" position="-0.3 0 -0.2" color="#d6b98c"></a-sphere>
<a-sphere radius="0.06" position="0.2 0 0.3" color="#d6b98c"></a-sphere>
<a-sphere radius="0.06" position="-0.2 0 0.3" color="#d6b98c"></a-sphere>

</a-entity>

</a-scene>
</body>
</html>
